name: Douban Sync

on:
  schedule:
    - cron: "17 3 * * *"  # 每天凌晨 3:17
  workflow_dispatch:
  repository_dispatch:
    types: [douban-sync]

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx Pillow

      - name: Sync from Douban
        run: python scripts/sync_douban.py
        env:
          DOUBAN_ID: ${{ vars.DOUBAN_ID }}
          DOUBAN_APIKEY: ${{ secrets.DOUBAN_APIKEY }}

      - name: Commit changes
        if: env.HAS_NEW_DATA == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: sync new movies/books from Douban"
          add: |
            src/data/books.json
            src/data/movies.json
            public/covers/
